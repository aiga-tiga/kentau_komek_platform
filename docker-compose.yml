services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: complaints
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/complaints
      JWT_SECRET: ${JWT_SECRET:?set a real JWT_SECRET in .env}
      BOT_SHARED_SECRET: ${BOT_SHARED_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set your bot token in .env}
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"

  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set your bot token in .env}
      BOT_SHARED_SECRET: ${BOT_SHARED_SECRET:-}
      API_BASE_URL: http://backend:4000/api
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads: